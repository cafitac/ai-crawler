name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dependencies
        run: uv sync --extra dev --extra http --extra mcp

      - name: Run tests
        run: uv run --extra dev pytest tests -q

      - name: Run lint
        run: uv run --extra dev ruff check .

      - name: CLI smoke
        run: |
          uv run python -m ai_crawler.cli --help
          uv run ai-crawler doctor

      - name: MCP auto_compile fixture smoke
        run: uv run --extra http python scripts/smoke-mcp-auto-compile.py
